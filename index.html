<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Southern Cross Bank - Login</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a1128;
    font-family: Arial, Helvetica, sans-serif;
  }
  .card {
    background: #ffffff;
    width: 100%;
    max-width: 360px;
    padding: 32px 28px;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
  }
  .card img {
    max-width: 180px;
    height: auto;
    margin-bottom: 20px;
  }
  label {
    display: block;
    text-align: left;
    font-size: 13px;
    font-weight: bold;
    color: #0a1128;
    margin-top: 14px;
    margin-bottom: 4px;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
  }
  input[type="submit"] {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    background: #1e3a8a;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
  }
  input[type="submit"]:hover {
    background: #16296b;
  }
  .footer-note {
    font-size: 11px;
    color: #666;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="card">
  <img src="southerncross.jpg" alt="Southern Cross Bank" />
  <form action="registration.html" method="get">
    <label for="clientNumber">Client Number:</label>
    <input type="text" id="clientNumber" name="clientNumber" value="">
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" value="">
    <input type="submit" value="Log In">
  </form>
  <p class="footer-note">&copy; Southern Cross Bank (fictional bank, used for classroom teaching purposes only)</p>
</div>
</body>
</html>
